databaseChangeLog:
  - changeSet:
      id: 2
      author: student
      changes:
        - createTable:
            tableName: exam_sessions
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()  # Изменено для PostgreSQL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exam_name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: open_time
                  type: TIMESTAMP
              - column:
                  name: close_time
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: exam_sessions
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_exam_sessions_created_by