databaseChangeLog:
  - changeSet:
      id: 3
      author: student
      changes:
        - createTable:
            tableName: questions
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()  # Изменено для PostgreSQL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: session_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: question_text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: question_order
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: correct_option_id
                  type: UUID
        - addForeignKeyConstraint:
            baseTableName: questions
            baseColumnNames: session_id
            referencedTableName: exam_sessions
            referencedColumnNames: id
            constraintName: fk_questions_session