databaseChangeLog:
  - changeSet:
      id: 4
      author: student
      changes:
        - createTable:
            tableName: options
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()  # Изменено для PostgreSQL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: question_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: option_text
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: option_order
                  type: INTEGER
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: options
            baseColumnNames: question_id
            referencedTableName: questions
            referencedColumnNames: id
            constraintName: fk_options_question